name: Model Training CICD

permissions:
contents: write

on:
push:

jobs:
run:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: Install Dependencies
    run: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt

  - name: Train Model
    run: |
      python train_model.py

  - name: Generate Report
    run: |
      echo "# RF and LR Model Score" > report.md
      cat scores.txt >> report.md

      echo "" >> report.md
      echo "# Confusion Matrix & Feature Importance" >> report.md
      echo "" >> report.md
      echo "## Confusion Matrix" >> report.md
      echo "![Confusion Matrix](./ConfusionMatrix.png)" >> report.md
      echo "" >> report.md
      echo "## Feature Importance" >> report.md
      echo "![Feature Importance](./FeatureImportance.png)" >> report.md

  - name: Publish Report
    run: |
      cat report.md >> $GITHUB_STEP_SUMMARY
```
